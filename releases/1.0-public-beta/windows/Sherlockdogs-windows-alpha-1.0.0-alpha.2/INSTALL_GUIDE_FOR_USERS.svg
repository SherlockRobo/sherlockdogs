<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2100" viewBox="0 0 1600 2100">
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .ink { fill: #111111; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .muted { fill: #5f6368; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .card { fill: #ffffff; stroke: #dedbd2; stroke-width: 2; }
      .yellow { fill: #f6c443; }
      .line { stroke: #f6c443; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .soft { fill: #f5f1e8; }
      .code { fill: #202124; font-family: "SFMono-Regular", Consolas, Menlo, monospace; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="2100"/>
  <text class="ink" x="140" y="180" font-size="96" font-weight="800">Sherlockdogs 安装指南</text>
  <text class="muted" x="144" y="250" font-size="38">把线索送进自己的 Inbox，本机自动入库，并可继续进入 Codex 对话</text>
  <rect class="yellow" x="140" y="295" width="480" height="18" rx="9"/>

  <g transform="translate(140,380)">
    <rect class="card" width="1320" height="270" rx="30"/>
    <circle class="yellow" cx="92" cy="92" r="46"/>
    <text class="ink" x="77" y="109" font-size="48" font-weight="800">1</text>
    <text class="ink" x="170" y="92" font-size="48" font-weight="800">选择你的 Inbox</text>
    <text class="muted" x="170" y="146" font-size="34">本地文件夹即可；手机同步可选 iCloud、坚果云、OneDrive 等。</text>
    <text class="muted" x="170" y="196" font-size="34">Sherlockdogs 不保存你的资料，只监听你电脑上的本地目录。</text>
    <text class="code" x="170" y="246" font-size="32">推荐目录：/Sherlockdogs/Inbox</text>
  </g>

  <path class="line" d="M800 670 L800 755"/>

  <g transform="translate(140,770)">
    <rect class="card" width="1320" height="300" rx="30"/>
    <circle class="yellow" cx="92" cy="92" r="46"/>
    <text class="ink" x="77" y="109" font-size="48" font-weight="800">2</text>
    <text class="ink" x="170" y="92" font-size="48" font-weight="800">打开 Sherlockdogs</text>
    <text class="muted" x="170" y="154" font-size="34">Mac：双击 Sherlockdogs Start.app</text>
    <text class="muted" x="170" y="208" font-size="34">Windows：双击 Sherlockdogs Start.cmd</text>
    <text class="muted" x="170" y="262" font-size="34">它会安装本机后台服务，只在你的电脑上处理 Inbox。</text>
  </g>

  <path class="line" d="M800 1090 L800 1175"/>

  <g transform="translate(140,1190)">
    <rect class="card" width="1320" height="300" rx="30"/>
    <circle class="yellow" cx="92" cy="92" r="46"/>
    <text class="ink" x="77" y="109" font-size="48" font-weight="800">3</text>
    <text class="ink" x="170" y="92" font-size="48" font-weight="800">可选：绑定同步盘</text>
    <text class="muted" x="170" y="154" font-size="34">本地测试可跳过；坚果云用户双击 Configure Nutstore Inbox。</text>
    <text class="muted" x="170" y="208" font-size="34">iCloud / OneDrive / Google Drive 用户使用自己的同步目录。</text>
    <text class="muted" x="170" y="262" font-size="34">完成后目录内会有 Sherlockdogs/Inbox 和 Sherlockdogs/Outbox。</text>
  </g>

  <path class="line" d="M800 1510 L800 1595"/>

  <g transform="translate(140,1610)">
    <rect class="card" width="1320" height="250" rx="30"/>
    <circle class="yellow" cx="92" cy="92" r="46"/>
    <text class="ink" x="77" y="109" font-size="48" font-weight="800">4</text>
    <text class="ink" x="170" y="92" font-size="48" font-weight="800">手机发送线索</text>
    <text class="muted" x="170" y="146" font-size="34">推荐用 iOS 快捷指令；也可保存到自己的同步盘。</text>
    <text class="code" x="170" y="196" font-size="32">保存路径：Sherlockdogs/Inbox</text>
    <text class="muted" x="170" y="240" font-size="34">不写指令或写 #1 只入库；写 #2 生成 Codex 小卡片。</text>
  </g>

  <g transform="translate(140,1890)">
    <rect class="soft" width="1320" height="170" rx="26"/>
    <text class="ink" x="44" y="56" font-size="36" font-weight="800">查看结果</text>
    <text class="muted" x="44" y="102" font-size="30">双击 Open Sherlockdogs Output，或用 Obsidian 打开本地 Markdown 图书馆。</text>
    <text class="muted" x="44" y="142" font-size="30">Obsidian 推荐，但不是必须。</text>
  </g>
</svg>
