name: Sherlockdogs Windows WeChat DB Sim Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "releases/1.0-public-beta/windows/**"
      - ".github/workflows/windows-wechat-db-sim-smoke.yml"

jobs:
  windows-wechat-db-sim-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Windows WeChat DB simulated smoke
        shell: pwsh
        run: |
          releases/1.0-public-beta/windows/Sherlockdogs-windows-alpha-1.0.0-alpha.2/packaging/windows-beta/windows_wechat_db_sim_smoke.ps1

      - name: Upload Windows WeChat DB simulated evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sherlockdogs-windows-wechat-db-sim-smoke
          path: |
            releases/1.0-public-beta/windows/Sherlockdogs-windows-alpha-1.0.0-alpha.2/evidence/windows-wechat-db-sim-smoke/**
          if-no-files-found: warn
