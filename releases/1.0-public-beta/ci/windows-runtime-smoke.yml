name: Sherlockdogs Windows Runtime Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packaging/windows-beta/**"
      - "scripts/**"
      - "templates/**"

jobs:
  windows-runtime-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run static release gate
        shell: bash
        run: packaging/windows-beta/release_check.sh

      - name: Run Windows runtime smoke
        shell: pwsh
        run: |
          packaging/windows-beta/runtime_smoke.ps1

      - name: Upload Windows runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sherlockdogs-windows-runtime-smoke
          path: |
            evidence/windows-runtime-smoke/**
          if-no-files-found: warn
