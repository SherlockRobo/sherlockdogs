<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sherlockdogs macOS install guide</title>
  <desc id="desc">Download the macOS folder, read START_HERE, open Start, connect WeChat, forward to yourself, and open output.</desc>
  <rect width="1600" height="900" fill="#ffffff"/>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #161616; }
    .muted { fill: #666b73; }
    .tiny { font-size: 24px; }
    .small { font-size: 30px; }
    .body { font-size: 36px; font-weight: 650; }
    .title { font-size: 78px; font-weight: 760; letter-spacing: 0; }
    .sub { font-size: 34px; fill: #5d636c; }
    .tag { font-size: 26px; font-weight: 650; fill: #8a5b00; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 27px; fill: #333; }
    .card { fill: #fffdf5; stroke: #efb800; stroke-width: 5; }
    .soft { fill: #f7f7f4; stroke: #dedbd2; stroke-width: 3; }
    .line { stroke: #efab00; stroke-width: 8; stroke-linecap: round; fill: none; }
    .blue { fill: #2474e8; }
    .green { fill: #25b86a; }
    .orange { fill: #f2b400; }
  </style>

  <text x="95" y="120" class="title">Mac install path</text>
  <text x="98" y="174" class="sub">Public beta: download the folder, start local services, connect WeChat, then open Markdown output.</text>

  <g transform="translate(95,235)">
    <rect x="0" y="0" width="1410" height="475" rx="42" class="soft"/>
    <path d="M154 236 H1256" class="line"/>
    <path d="M1256 236 l-22 -16 M1256 236 l-22 16" class="line"/>

    <g transform="translate(52,82)">
      <rect width="190" height="270" rx="28" class="card"/>
      <circle cx="95" cy="70" r="38" class="orange"/>
      <text x="95" y="82" text-anchor="middle" font-size="42" font-weight="760">1</text>
      <text x="95" y="146" text-anchor="middle" class="body">Download</text>
      <text x="95" y="188" text-anchor="middle" class="small">macOS folder</text>
      <text x="95" y="226" text-anchor="middle" class="mono">alpha.3</text>
    </g>

    <g transform="translate(290,82)">
      <rect width="190" height="270" rx="28" class="card"/>
      <circle cx="95" cy="70" r="38" class="orange"/>
      <text x="95" y="82" text-anchor="middle" font-size="42" font-weight="760">2</text>
      <text x="95" y="146" text-anchor="middle" class="body">Read</text>
      <text x="95" y="188" text-anchor="middle" class="small">START_HERE</text>
      <text x="95" y="226" text-anchor="middle" class="mono">first</text>
    </g>

    <g transform="translate(528,82)">
      <rect width="190" height="270" rx="28" class="card"/>
      <circle cx="95" cy="70" r="38" class="orange"/>
      <text x="95" y="82" text-anchor="middle" font-size="42" font-weight="760">3</text>
      <text x="95" y="146" text-anchor="middle" class="body">Open Start</text>
      <text x="95" y="188" text-anchor="middle" class="small">right-click</text>
      <text x="95" y="226" text-anchor="middle" class="mono">Start.app</text>
    </g>

    <g transform="translate(766,82)">
      <rect width="190" height="270" rx="28" class="card"/>
      <circle cx="95" cy="70" r="38" class="orange"/>
      <text x="95" y="82" text-anchor="middle" font-size="42" font-weight="760">4</text>
      <text x="95" y="146" text-anchor="middle" class="body">Connect</text>
      <text x="95" y="188" text-anchor="middle" class="small">WeChat</text>
      <text x="95" y="226" text-anchor="middle" class="mono">opt-in</text>
    </g>

    <g transform="translate(1004,82)">
      <rect width="190" height="270" rx="28" class="card"/>
      <circle cx="95" cy="70" r="38" class="orange"/>
      <text x="95" y="82" text-anchor="middle" font-size="42" font-weight="760">5</text>
      <text x="95" y="146" text-anchor="middle" class="body">Forward</text>
      <text x="95" y="188" text-anchor="middle" class="small">to yourself</text>
      <text x="95" y="226" text-anchor="middle" class="mono">#2 test</text>
    </g>

    <g transform="translate(1242,82)">
      <rect width="118" height="270" rx="28" class="card"/>
      <circle cx="59" cy="70" r="38" class="orange"/>
      <text x="59" y="82" text-anchor="middle" font-size="42" font-weight="760">6</text>
      <text x="59" y="146" text-anchor="middle" class="body">Open</text>
      <text x="59" y="188" text-anchor="middle" class="small">Output</text>
      <text x="59" y="226" text-anchor="middle" class="mono">MD</text>
    </g>
  </g>

  <g transform="translate(95,770)">
    <rect width="690" height="72" rx="20" fill="#f5f8ff" stroke="#c9dcff" stroke-width="3"/>
    <text x="32" y="47" class="small">First run: if macOS blocks it, right-click the app and choose Open.</text>
  </g>
  <g transform="translate(815,770)">
    <rect width="690" height="72" rx="20" fill="#fff8e6" stroke="#f0c84a" stroke-width="3"/>
    <text x="32" y="47" class="small">If nothing arrives: run OneTouchRepair, then try one simple #2 item.</text>
  </g>
</svg>
